type Query {
  getProductById(productId: String): [Product]
}

type Specification {
  Name: String
  Value: [String]
}

type Installment {
  value: Float
  numberOfInstallments: Int
  interestRate: Float
}

type Product {
  Id: String
  Name: String
  Value: [Specification]
  listPrice: Float
  price: Float
  sellingPrice: Float
  installments: [Installment]
}
